<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아침의 발견 — Morning Find</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-en">morning <em>find</em></span>
        <span class="logo-ko">아침의 발견</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-time="all">전체</button>
        <button class="nav-btn" data-time="open8">8시 오픈</button>
        <button class="nav-btn" data-time="open9">9시 오픈</button>
        <button class="nav-btn" data-time="open10">10시 오픈</button>
        <span class="nav-divider"></span>
        <button class="nav-meal" id="mealToggle" data-active="false">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          간단한 식사
        </button>
      </nav>
      <button class="list-toggle" id="listToggle" aria-label="카페 목록 보기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- Map -->
  <div id="map"></div>

  <!-- Side Panel -->
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header">
      <span class="panel-count"><span id="cafeCount">12</span>곳의 카페</span>
      <button class="panel-close" id="panelClose" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cafe-list" id="cafeList"></div>
  </aside>

  <!-- Cafe Detail Card -->
  <div class="detail-card" id="detailCard">
    <button class="detail-close" id="detailClose" aria-label="닫기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="detail-img-wrap">
      <img class="detail-img" id="detailImg" src="" alt="" />
      <div class="detail-tags" id="detailTags"></div>
    </div>
    <div class="detail-body">
      <h2 class="detail-name" id="detailName"></h2>
      <p class="detail-address" id="detailAddress"></p>
      <div class="detail-meta">
        <span class="meta-item" id="detailHours">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span></span>
        </span>
        <span class="meta-item" id="detailPrice">
          <span class="price-symbol">₩</span>
          <span></span>
        </span>
      </div>
      <p class="detail-desc" id="detailDesc"></p>
      <a class="detail-link" id="detailLink" href="#" target="_blank" rel="noopener">
        네이버 지도에서 보기
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
  </div>

  <!-- Cafe Info Panel (pin click) -->
  <aside class="info-panel" id="infoPanel">
    <div class="info-panel-header">
      <div class="info-panel-meta">
        <h2 class="info-cafe-name" id="infoCafeName"></h2>
        <div class="info-badges" id="infoBadges"></div>
      </div>
      <button class="info-panel-close" id="infoPanelClose" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="info-iframe-wrap">
      <iframe id="naverIframe" class="naver-iframe" src="" frameborder="0" allow="geolocation"></iframe>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=bexvmxs284&submodules=geocoder" async defer onload="initMap()"></script>
</body>
</html>
